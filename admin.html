<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة التحكم | إدارة المحتوى</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #d3b675;
            --bg-color: #0f0c29;
            --card-bg: rgba(255, 255, 255, 0.05);
            --text-color: #fff;
        }
        body {
            font-family: 'Cairo', sans-serif;
            background: linear-gradient(to right, #24243e, #302b63, #0f0c29);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
            background: var(--card-bg);
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
            backdrop-filter: blur(10px);
        }
        h1, h2 { text-align: center; color: var(--primary); }
        .form-group {
            margin-bottom: 20px;
            display: flex;
            flex-direction: column;
        }
        label {
            margin-bottom: 8px;
            font-weight: 600;
            font-size: 0.9rem;
            color: #ddd;
        }
        input, textarea {
            padding: 12px;
            border-radius: 8px;
            border: 1px solid rgba(255,255,255,0.2);
            background: rgba(0,0,0,0.2);
            color: white;
            font-family: inherit;
        }
        input:focus, textarea:focus {
            outline: none;
            border-color: var(--primary);
        }
        textarea { resize: vertical; min-height: 80px; }
        .lang-split {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }
        .lang-split input, .lang-split textarea { width: 90%; }
        
        button {
            background: var(--primary);
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 30px;
            font-size: 1.1rem;
            cursor: pointer;
            width: 100%;
            margin-top: 20px;
            transition: 0.3s;
        }
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(211, 182, 117, 0.4);
        }
        .section-box {
            border: 1px solid rgba(255,255,255,0.1);
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 30px;
        }
        .header-labels {
            display: grid;
            grid-template-columns: 1fr 1fr;
            margin-bottom: 10px;
            font-weight: bold;
            color: var(--primary);
        }
        
        #overlay {
            position: fixed; top:0; left:0; width:100%; height:100%;
            background: rgba(0,0,0,0.9);
            display: flex; justify-content: center; align-items: center;
            z-index: 1000;
            flex-direction: column;
        }
        #overlay input { font-size: 1.2rem; text-align: center; margin-bottom: 15px;}
        #overlay button { width: auto; }
    </style>
</head>
<body>

    <!-- Simple Auth Overlay -->
    <div id="overlay">
        <h2>تسجيل الدخول للوحة التحكم</h2>
        <input type="password" id="adminPass" placeholder="كلمة المرور">
        <button onclick="checkPass()">دخول</button>
    </div>

    <div class="container" style="display:none;" id="admin-panel">
        <h1>⚙️ إدارة محتوى الموقع (CMS)</h1>
        <p style="text-align: center; color: #ccc;">يمكنك هنا تعديل نصوص الموقع باللغتين العربية والتركية، وتغيير مسارات الصور. بعد الانتهاء اضغط على "حفظ التعديلات" لتحميل ملف <br> <b>content.json</b> <br> واستبداله في مجلد موقعك.</p>
        
        <form id="cmsForm">
            <!-- Dynamic Form Content Will Be Generated Here -->
            <div id="form-container"></div>
            
            <button type="button" onclick="exportJSON()">💾 حفظ التعديلات وتحميل الملف (Download)</button>
        </form>
    </div>

    <script>
        // Very basic protection
        function checkPass() {
            const pass = document.getElementById('adminPass').value;
            if(pass === 'admin123') { // Replace with desired text
                document.getElementById('overlay').style.display = 'none';
                document.getElementById('admin-panel').style.display = 'block';
                loadData();
            } else {
                alert('كلمة المرور خاطئة');
            }
        }

        let siteData = {};

        async function loadData() {
            try {
                const res = await fetch('content.json');
                siteData = await res.json();
                generateForm();
            } catch (e) {
                alert("لم أتمكن من تحميل ملف content.json. تأكد أنه موجود في مجلد الموقع.");
            }
        }

        function createInputGroup(keyPath, label, arValue, trValue, isTextArea = false) {
            const elType = isTextArea ? 'textarea' : 'input';
            return `
                <div class="form-group">
                    <label>${label}</label>
                    <div class="lang-split">
                        <div>
                            <small>العربية (AR)</small><br>
                            <${elType} data-path="${keyPath}.ar" dir="rtl">${isTextArea ? arValue : ''}</${elType}>${!isTextArea ? ` value="${arValue}"` : ''}
                        </div>
                        <div>
                            <small>التركية (TR)</small><br>
                            <${elType} data-path="${keyPath}.tr" dir="ltr">${isTextArea ? trValue : ''}</${elType}>${!isTextArea ? ` value="${trValue}"` : ''}
                        </div>
                    </div>
                </div>
            `;
        }

        function createImageGroup(keyPath, label, val) {
            return `
                <div class="form-group">
                    <label>${label}</label>
                    <div style="display: flex; gap: 10px; align-items: center; margin-bottom: 10px;">
                        <img src="${val}" alt="Preview" style="width: 50px; height: 50px; border-radius: 5px; object-fit: cover; border: 1px solid rgba(255,255,255,0.2);">
                        <input type="file" accept="image/*" onchange="handleImageUpload(event, '${keyPath}')" style="width: 100%;">
                    </div>
                    <input type="hidden" data-path="${keyPath}" id="input-${keyPath.replace('.', '-')}" value="${val}">
                </div>
            `;
        }

        function generateForm() {
            const formContainer = document.getElementById('form-container');
            let html = '';

            // --- Site Title ---
            html += `<div class="section-box"><h2>عنوان الموقع بالمقصفح</h2>`;
            html += createInputGroup('site_title', 'عنوان الصفحة', siteData.site_title.ar, siteData.site_title.tr);
            html += `</div>`;

            // --- Images ---
            html += `<div class="section-box"><h2>الصور (مسارات الروابط)</h2>`;
            html += createImageGroup('images.logo', 'صورة الشعار (Logo)', siteData.images.logo);
            html += createImageGroup('images.hero_img', 'صورتي الشخصية', siteData.images.hero_img);
            html += createImageGroup('images.books_img', 'صورة الكتب', siteData.images.books_img);
            html += `</div>`;

            // --- Hero Section ---
            html += `<div class="section-box"><h2>قسم الغلاف (Hero)</h2>`;
            html += createInputGroup('hero.greeting', 'الترحيب', siteData.hero.greeting.ar, siteData.hero.greeting.tr);
            html += createInputGroup('hero.name_first', 'الاسم الأول', siteData.hero.name_first.ar, siteData.hero.name_first.tr);
            html += createInputGroup('hero.name_last', 'الاسم الأخير', siteData.hero.name_last.ar, siteData.hero.name_last.tr);
            html += createInputGroup('hero.title', 'المسمى الوظيفي', siteData.hero.title.ar, siteData.hero.title.tr);
            html += createInputGroup('hero.description', 'الوصف', siteData.hero.description.ar, siteData.hero.description.tr, true);
            html += createInputGroup('hero.cta_primary', 'الزر الرئيسي', siteData.hero.cta_primary.ar, siteData.hero.cta_primary.tr);
            html += createInputGroup('hero.cta_secondary', 'الزر الثانوي', siteData.hero.cta_secondary.ar, siteData.hero.cta_secondary.tr);
            html += createInputGroup('hero.experience_years', 'رقم سنوات الخبرة', siteData.hero.experience_years.ar, siteData.hero.experience_years.tr);
            html += createInputGroup('hero.experience_text', 'نبذة الخبرة', siteData.hero.experience_text.ar, siteData.hero.experience_text.tr);
            html += `</div>`;

            // --- About Section ---
            html += `<div class="section-box"><h2>قسم (من أنا)</h2>`;
            html += createInputGroup('about.summary_text', 'الملخص المهني', siteData.about.summary_text.ar, siteData.about.summary_text.tr, true);
            html += createInputGroup('about.education_text', 'التعليم', siteData.about.education_text.ar, siteData.about.education_text.tr, true);
            html += `</div>`;

            // --- Portfolio Gallery Section ---
            html += `<div class="section-box" id="portfolio-manager"><h2>معرض الأعمال (الصور والمشاريع)</h2>`;
            html += `<div id="portfolio-items-container"></div>`;
            html += `<button type="button" onclick="addPortfolioItem()" style="background: #28a745; margin-bottom: 20px;">➕ إضافة عمل جديد للمعرض</button>`;
            html += `</div>`;

            formContainer.innerHTML = html;
            renderPortfolioItems();
        }

        function renderPortfolioItems() {
            const container = document.getElementById('portfolio-items-container');
            if(!container) return;
            
            let html = '';
            const items = siteData.portfolio.items || [];
            
            items.forEach((item, index) => {
                html += `
                <div style="border: 1px dashed rgba(255,255,255,0.3); padding: 15px; margin-bottom: 15px; position: relative;">
                    <button type="button" onclick="removePortfolioItem(${index})" style="position: absolute; top: 10px; left: 10px; background: #dc3545; color: white; border: none; padding: 5px 10px; width: auto; font-size: 0.8rem; margin: 0;">❌ حذف</button>
                    <h4>العمل رقم (${index + 1})</h4>
                    
                    <div class="form-group">
                        <label>صورة العمل</label>
                        <div style="display: flex; gap: 10px; align-items: center; margin-bottom: 10px;">
                            <img src="${item.image}" alt="Preview" style="width: 50px; height: 50px; border-radius: 5px; object-fit: cover; border: 1px solid rgba(255,255,255,0.2);">
                            <input type="file" accept="image/*" onchange="handleArrayImageUpload(event, ${index})" style="width: 100%;">
                        </div>
                        <input type="hidden" id="port-img-${index}" data-array-path="portfolio.items.${index}.image" value="${item.image}">
                    </div>

                    <div class="form-group">
                        <label>الفلتر (التصنيف)</label>
                        <select data-array-path="portfolio.items.${index}.category" style="padding: 10px; background: rgba(0,0,0,0.2); color: white; border: 1px solid rgba(255,255,255,0.2); border-radius: 8px;">
                            <option value="social" ${item.category === 'social' ? 'selected' : ''}>سوشيال ميديا (social)</option>
                            <option value="uiux" ${item.category === 'uiux' ? 'selected' : ''}>واجهات وتطبيقات (uiux)</option>
                        </select>
                    </div>

                    <div class="lang-split">
                         <div>
                            <small>العنوان (AR)</small><br>
                            <input type="text" data-array-path="portfolio.items.${index}.title.ar" value="${item.title.ar}" dir="rtl" style="width: 90%;">
                        </div>
                        <div>
                            <small>العنوان (TR)</small><br>
                            <input type="text" data-array-path="portfolio.items.${index}.title.tr" value="${item.title.tr}" dir="ltr" style="width: 90%;">
                        </div>
                    </div>
                    
                    <div class="lang-split" style="margin-top: 10px;">
                         <div>
                            <small>الوصف الفرعي (AR)</small><br>
                            <input type="text" data-array-path="portfolio.items.${index}.subtitle.ar" value="${item.subtitle.ar}" dir="rtl" style="width: 90%;">
                        </div>
                        <div>
                            <small>الوصف الفرعي (TR)</small><br>
                            <input type="text" data-array-path="portfolio.items.${index}.subtitle.tr" value="${item.subtitle.tr}" dir="ltr" style="width: 90%;">
                        </div>
                    </div>
                </div>`;
            });
            container.innerHTML = html;
        }

        // Handle Array File Upload
        function handleArrayImageUpload(event, index) {
            const file = event.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    const base64String = e.target.result;
                    document.getElementById(`port-img-${index}`).value = base64String;
                    const imgPreview = event.target.previousElementSibling;
                    if(imgPreview && imgPreview.tagName === 'IMG') {
                        imgPreview.src = base64String;
                    }
                    // Update array live to not lose on re-render
                    siteData.portfolio.items[index].image = base64String;
                };
                reader.readAsDataURL(file);
            }
        }

        function addPortfolioItem() {
            syncArrayInputsToData(); // Save current before re-rendering
            if(!siteData.portfolio.items) siteData.portfolio.items = [];
            siteData.portfolio.items.push({
                id: "item_" + Date.now(),
                category: "social",
                image: "",
                title: { ar: "عنوان جديد", tr: "Yeni Başlık" },
                subtitle: { ar: "وصف فرعي", tr: "Alt Başlık" }
            });
            renderPortfolioItems();
        }

        function removePortfolioItem(index) {
            if(confirm('هل أنت متأكد من حذف هذا العمل؟')) {
                syncArrayInputsToData();
                siteData.portfolio.items.splice(index, 1);
                renderPortfolioItems();
            }
        }

        // Helper to grab live inputs before re-rendering chunks
        function syncArrayInputsToData() {
            const arrayInputs = document.querySelectorAll('[data-array-path]');
            arrayInputs.forEach(input => {
                const path = input.getAttribute('data-array-path');
                setNestedValue(siteData, path, input.value);
            });
        }

        // Handle File Upload and Convert to Base64
        function handleImageUpload(event, keyPath) {
            const file = event.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    const base64String = e.target.result;
                    // Update the hidden input with the base64 string
                    document.getElementById(`input-${keyPath.replace('.', '-')}`).value = base64String;
                    
                    // Update the preview image
                    const imgPreview = event.target.previousElementSibling;
                    if(imgPreview && imgPreview.tagName === 'IMG') {
                        imgPreview.src = base64String;
                    }
                };
                reader.readAsDataURL(file);
            }
        }

        function exportJSON() {
            // First sync any array inputs
            try { syncArrayInputsToData(); } catch(e){}

            // Collect all normal inputs with data-path
            const inputs = document.querySelectorAll('[data-path]');
            let newData = JSON.parse(JSON.stringify(siteData)); // Deep copy

            inputs.forEach(input => {
                const path = input.getAttribute('data-path');
                const val = input.value;
                setNestedValue(newData, path, val);
            });

            // Create download link
            const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(newData, null, 2));
            const dlAnchorElem = document.createElement('a');
            dlAnchorElem.setAttribute("href", dataStr);
            dlAnchorElem.setAttribute("download", "content.json");
            dlAnchorElem.click();
            
            alert('تم تحميل الملف بنجاح! قم بنقله إلى مجلد الموقع واستبدال الملف القديم لترى التعديلات.');
        }

        function setNestedValue(obj, path, value) {
            const keys = path.split('.');
            let current = obj;
            for (let i = 0; i < keys.length - 1; i++) {
                current = current[keys[i]];
            }
            current[keys[keys.length - 1]] = value;
        }
    </script>
</body>
</html>
